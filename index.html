<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>電卓 | GitHub Pages</title>
    <meta name="description" content="GitHub Pagesで公開できるシンプルな電卓" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app" aria-label="電卓アプリ">
      <section class="calculator" aria-label="電卓">
        <div class="display" role="status" aria-live="polite" aria-atomic="true">
          <p id="history" class="history" aria-label="計算履歴"></p>
          <p id="current" class="current" aria-label="現在の入力">0</p>
        </div>

        <div class="keys" role="group" aria-label="計算ボタン">
          <button type="button" class="key key--control" data-action="all-clear">AC</button>
          <button type="button" class="key key--control" data-action="delete">←</button>
          <button type="button" class="key key--operator" data-action="operator" data-value="/">÷</button>
          <button type="button" class="key key--operator" data-action="operator" data-value="*">×</button>

          <button type="button" class="key" data-action="number" data-value="7">7</button>
          <button type="button" class="key" data-action="number" data-value="8">8</button>
          <button type="button" class="key" data-action="number" data-value="9">9</button>
          <button type="button" class="key key--operator" data-action="operator" data-value="-">−</button>

          <button type="button" class="key" data-action="number" data-value="4">4</button>
          <button type="button" class="key" data-action="number" data-value="5">5</button>
          <button type="button" class="key" data-action="number" data-value="6">6</button>
          <button type="button" class="key key--operator" data-action="operator" data-value="+">+</button>

          <button type="button" class="key" data-action="number" data-value="1">1</button>
          <button type="button" class="key" data-action="number" data-value="2">2</button>
          <button type="button" class="key" data-action="number" data-value="3">3</button>
          <button type="button" class="key key--equal" data-action="calculate">=</button>

          <button type="button" class="key key--zero" data-action="number" data-value="0">0</button>
          <button type="button" class="key" data-action="decimal">.</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
